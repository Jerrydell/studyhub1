{% extends "base.html" %}
{% block title %}Reset Password - StudyHub{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow-sm mt-5">
            <div class="card-header text-white text-center" style="background:linear-gradient(135deg,#1a1a2e,#0d6efd);">
                <h4>🔒 Set New Password</h4>
                <small class="opacity-75">by ABA-TECH</small>
            </div>
            <div class="card-body p-4">
                <form method="POST">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <div class="mb-3">
                        <label class="form-label fw-bold">🔒 New Password</label>
                        <div class="input-group">
                            <input type="password" name="new_password" class="form-control form-control-lg" id="newPass" required placeholder="Enter new password">
                            <button class="btn btn-outline-secondary" type="button" onclick="togglePassword('newPass', this)">
                                <i class="bi bi-eye"></i>
                            </button>
                        </div>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-bold">🔒 Confirm Password</label>
                        <div class="input-group">
                            <input type="password" name="confirm_password" class="form-control form-control-lg" id="confirmPass" required placeholder="Confirm new password">
                            <button class="btn btn-outline-secondary" type="button" onclick="togglePassword('confirmPass', this)">
                                <i class="bi bi-eye"></i>
                            </button>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 btn-lg">
                        ✅ Reset Password
                    </button>
                </form>
                <div class="text-center mt-3">
                    <a href="{{ url_for('auth.login') }}">← Back to Login</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
function togglePassword(fieldId, btn) {
    const field = document.getElementById(fieldId);
    const icon = btn.querySelector('i');
    if (field.type === 'password') {
        field.type = 'text';
        icon.className = 'bi bi-eye-slash';
    } else {
        field.type = 'password';
        icon.className = 'bi bi-eye';
    }
}
</script>
{% endblock %}
