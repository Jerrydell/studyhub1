{% extends "base.html" %}
{% block title %}Reset Password - StudyHub{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5 col-lg-4">
        <div class="card shadow-sm mt-5">
            <div class="card-header text-white text-center" style="background:linear-gradient(135deg,#1a1a2e,#0d6efd);">
                <h5 class="mb-1">🔑 Reset Password</h5>
                <small class="opacity-75">by ABA-TECH</small>
            </div>
            <div class="card-body p-4">
                <form method="POST">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                    <div class="mb-3">
                        <label class="form-label">📧 Your Email</label>
                        <input type="email" name="email" class="form-control" required placeholder="Enter your registered email">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">🔒 New Password</label>
                        <div class="input-group">
                            <input type="password" name="new_password" class="form-control" id="newPass" required placeholder="Enter new password">
                            <button class="btn btn-outline-secondary" type="button" onclick="togglePwd('newPass',this)">
                                <i class="bi bi-eye"></i>
                            </button>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label">🔒 Confirm Password</label>
                        <div class="input-group">
                            <input type="password" name="confirm_password" class="form-control" id="confirmPass" required placeholder="Confirm new password">
                            <button class="btn btn-outline-secondary" type="button" onclick="togglePwd('confirmPass',this)">
                                <i class="bi bi-eye"></i>
                            </button>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary w-100 btn-lg">
                        ✅ Reset Password
                    </button>
                </form>

                <div class="text-center mt-3">
                    <a href="{{ url_for('auth.login') }}" class="text-decoration-none">
                        ← Back to Login
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
function togglePwd(id, btn) {
    const f = document.getElementById(id);
    const i = btn.querySelector('i');
    if (f.type === 'password') {
        f.type = 'text';
        i.className = 'bi bi-eye-slash';
    } else {
        f.type = 'password';
        i.className = 'bi bi-eye';
    }
}
</script>
{% endblock %}
