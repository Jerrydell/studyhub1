{% extends "base.html" %}
{% block title %}Forgot Password - StudyHub{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow-sm mt-5">
            <div class="card-header text-white text-center" style="background:linear-gradient(135deg,#1a1a2e,#0d6efd);">
                <h4>🔑 Forgot Password</h4>
                <small class="opacity-75">by ABA-TECH</small>
            </div>
            <div class="card-body p-4">
                <p class="text-muted text-center mb-4">Enter your email and we'll send you a reset link.</p>
                <form method="POST">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <div class="mb-3">
                        <label class="form-label fw-bold">📧 Your Email</label>
                        <input type="email" name="email" class="form-control form-control-lg" required placeholder="Enter your email">
                    </div>
                    <button type="submit" class="btn btn-primary w-100 btn-lg">
                        📨 Send Reset Link
                    </button>
                </form>
                <div class="text-center mt-3">
                    <a href="{{ url_for('auth.login') }}">← Back to Login</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
